<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins',sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#43cea2,#185a9d);
    }

    .register-box{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      padding:40px;
      border-radius:20px;
      width:340px;
      text-align:center;
      color:white;
      box-shadow:0 8px 32px rgba(0,0,0,0.2);
    }

    .input-box{
      position:relative;
      margin:18px 0;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:30px;
      outline:none;
    }

    .toggle{
      position:absolute;
      right:15px;
      top:12px;
      cursor:pointer;
      color:black;
    }

    .register-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:30px;
      background:linear-gradient(45deg,#ff512f,#dd2476);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .register-btn:hover{
      transform:scale(1.05);
    }

    .strength{
      font-size:12px;
      text-align:left;
      margin-top:5px;
    }

    a{
      color:#fff;
      font-size:14px;
      text-decoration:none;
    }
  </style>
</head>

<body>

<div class="register-box">

  <h2>Create Account 🚀</h2>

  <div class="input-box">
    <input type="email" id="email" placeholder="Email" required>
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password" onkeyup="checkStrength()" required>
    <span class="toggle" onclick="togglePassword('password')">👁</span>
    <div id="strength" class="strength"></div>
  </div>

  <div class="input-box">
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <span class="toggle" onclick="togglePassword('confirmPassword')">👁</span>
  </div>

  <button class="register-btn" onclick="register()">Register</button>

  <p style="margin-top:15px">
    Already have an account? <a href="/login.html">Login</a>
  </p>

</div>

<script>

function togglePassword(id){
  const field = document.getElementById(id);
  field.type = field.type === "password" ? "text" : "password";
}

function checkStrength(){

  const password = document.getElementById("password").value;
  const strength = document.getElementById("strength");

  if(password.length < 6){
    strength.innerHTML = "Weak ❌";
    strength.style.color = "red";
  }
  else if(password.match(/[A-Z]/) && password.match(/[0-9]/)){
    strength.innerHTML = "Strong 💪";
    strength.style.color = "lightgreen";
  }
  else{
    strength.innerHTML = "Medium ⚠";
    strength.style.color = "orange";
  }
}

function register(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if(!email || !password || !confirmPassword){
    alert("Please fill all fields");
    return;
  }

  if(password.length < 6){
    alert("Password must be at least 6 characters");
    return;
  }

  if(password !== confirmPassword){
    alert("Passwords do not match");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    window.location.href="/login.html";
  });

}

/* ✅ AUTO REDIRECT IF ALREADY LOGGED IN */
if(localStorage.getItem("token")){
  window.location.href="/";
}

</script>

</body>
</html>
